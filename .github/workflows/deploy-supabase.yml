name: Supabase Backend

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_ID: aenrxbhjqxlbkybculft

jobs:
  verify:
    name: Verify project and database prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      ready: ${{ steps.token.outputs.ready }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # トークン未設定でも赤❌にしない(デプロイ自体が不可能なので、警告してスキップする)。
      # 設定されている場合のみ、以降の検証とデプロイが有効になる。
      - name: Check SUPABASE_ACCESS_TOKEN
        id: token
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SUPABASE_ACCESS_TOKEN が未設定のため、Supabaseの検証と自動デプロイをスキップしました。Actions secrets にSupabaseのPersonal Access Tokenを設定すると有効になります。"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify access token and project
        if: steps.token.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID")"
          if ! jq -e --arg ref "$SUPABASE_PROJECT_ID" '.. | strings | select(. == $ref)' \
            <<<"$response" >/dev/null; then
            echo "::error::Supabase access token cannot access the configured project."
            exit 1
          fi

      - name: Verify operational hardening migration
        if: steps.token.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          payload="$(cat <<'JSON'
          {
            "query": "select case when to_regprocedure('public.upsert_booth_doc_if_rev(text,jsonb,bigint)') is not null and to_regprocedure('public.upsert_stage_doc_if_rev(jsonb,bigint)') is not null and to_regprocedure('public.replace_festival_docs(jsonb,jsonb)') is not null and to_regprocedure('public.record_pin_failure(text,integer,integer)') is not null then 'OPERATIONAL_HARDENING_READY' else 'MISSING_OPERATIONAL_HARDENING' end as status"
          }
          JSON
          )"
          endpoint="https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/database/query"
          # read-only エンドポイントが使えない環境では通常のqueryエンドポイントへフォールバック
          response="$(curl --fail --silent --show-error --request POST \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" "$endpoint/read-only")" \
          || response="$(curl --fail --silent --show-error --request POST \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" "$endpoint")"
          if ! jq -e '.. | strings | select(. == "OPERATIONAL_HARDENING_READY")' \
            <<<"$response" >/dev/null; then
            echo "::error::マイグレーション004が未適用です。先にSQL Editorで supabase/migrations/004_operational_hardening.sql を実行してください。Edge Functionのデプロイは中止しました。"
            exit 1
          fi

  deploy:
    name: Deploy super-handler
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.verify.outputs.ready == 'true'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FESTIVAL_PUBLIC_KEY: ${{ secrets.VITE_FESTIVAL_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # verify_jwt はブラウザのpublishableキー運用に必須のfalse。config.tomlに加えて
      # フラグでも明示し、デプロイで有効化へ戻る事故を防ぐ。
      - name: Deploy existing production function slug
        run: supabase functions deploy super-handler --project-ref "$SUPABASE_PROJECT_ID" --use-api --no-verify-jwt

      - name: Smoke test public API
        shell: bash
        run: |
          set -euo pipefail
          test -n "$FESTIVAL_PUBLIC_KEY"
          response="$(curl --fail --silent --show-error \
            --request POST \
            --header "Origin: https://sakadosoutan-boop.github.io" \
            --header "apikey: $FESTIVAL_PUBLIC_KEY" \
            --header "Content-Type: application/json" \
            --data '{"action":"get_public"}' \
            "https://$SUPABASE_PROJECT_ID.supabase.co/functions/v1/super-handler")"
          jq -e '.ok == true' <<<"$response" >/dev/null
