name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      # Secrets未設定のまま公開すると、端末間でデータが共有されない「デモモード」が
      # 本番URLに乗ってしまう。意図的なデモ公開はリポジトリ変数 ALLOW_DEMO_DEPLOY=true で許可する。
      - name: Ensure shared API secrets exist
        env:
          VITE_FESTIVAL_API_URL: ${{ secrets.VITE_FESTIVAL_API_URL }}
          VITE_FESTIVAL_PUBLIC_KEY: ${{ secrets.VITE_FESTIVAL_PUBLIC_KEY }}
          VITE_FESTIVAL_ANON_KEY: ${{ secrets.VITE_FESTIVAL_ANON_KEY }}
          ALLOW_DEMO_DEPLOY: ${{ vars.ALLOW_DEMO_DEPLOY }}
        run: |
          if [ -z "$VITE_FESTIVAL_API_URL" ] || { [ -z "$VITE_FESTIVAL_PUBLIC_KEY" ] && [ -z "$VITE_FESTIVAL_ANON_KEY" ]; }; then
            if [ "$ALLOW_DEMO_DEPLOY" = "true" ]; then
              echo "::warning::共有APIのSecretsが未設定です。デモモード（端末間でデータ共有なし）で公開します。"
            else
              echo "::error::VITE_FESTIVAL_API_URL / VITE_FESTIVAL_PUBLIC_KEY が未設定のため中止しました。本番用Secretsを設定するか、デモ公開を許可する場合はリポジトリ変数 ALLOW_DEMO_DEPLOY=true を設定してください。"
              exit 1
            fi
          fi
          # URLの貼り付け事故(引用符・空白・https以外)をデプロイ前に検出する
          if [ -n "$VITE_FESTIVAL_API_URL" ]; then
            case "$VITE_FESTIVAL_API_URL" in
              *'"'*|*"'"*|*' '*)
                echo "::error::VITE_FESTIVAL_API_URL に引用符または空白が含まれています。URLだけを貼り直してください（例: https://xxxx.supabase.co/functions/v1/festival-admin）。"
                exit 1;;
              https://*) ;;
              *)
                echo "::error::VITE_FESTIVAL_API_URL は https:// で始まるURLにしてください。現在の値は形式が不正です。"
                exit 1;;
            esac
          fi
      - run: npm run build
        env:
          VITE_FESTIVAL_API_URL: ${{ secrets.VITE_FESTIVAL_API_URL }}
          VITE_FESTIVAL_PUBLIC_KEY: ${{ secrets.VITE_FESTIVAL_PUBLIC_KEY }}
          VITE_FESTIVAL_ANON_KEY: ${{ secrets.VITE_FESTIVAL_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
